# ============================================================
# ClassifierBT CI/CD Pipeline
# ============================================================
# This workflow runs on every push to main:
#   1. Builds both Docker images (catches syntax/dependency errors)
#   2. Runs tests
#   3. Deploys to EC2 via SSH
#
# Required GitHub Secrets:
#   EC2_HOST         — EC2 public IP or classifierbt.com
#   EC2_USER         — SSH username (ubuntu)
#   EC2_SSH_KEY      — Contents of your .pem private key
#   EC2_PROJECT_PATH — Path on EC2 (e.g., /home/ubuntu/tumor-classifier)
# ============================================================

name: Deploy ClassifierBT

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Step 1: Build & Test ──────────────────────────────────
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # The backend Docker build requires model/tumor_model.keras which is
      # gitignored. We create an empty placeholder so the COPY step succeeds
      # in CI. The real model already exists on EC2 from the initial setup.
      - name: Create model placeholder for CI build
        run: mkdir -p backend/model && touch backend/model/tumor_model.keras

      - name: Build backend Docker image
        run: docker build -t classifierbt-backend ./backend

      - name: Build frontend Docker image
        run: docker build -t classifierbt-frontend ./frontend

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run tests
        run: |
          cd backend
          pytest tests/ -v

  # ── Step 2: Deploy to EC2 ─────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          # command_timeout controls how long this SSH step waits.
          # TensorFlow + sentence-transformers takes ~60s to start on t3.medium.
          # We fire docker compose up -d and exit immediately — we don't wait
          # for containers to be healthy inside this SSH session.
          command_timeout: 60m
          script: |
            cd ${{ secrets.EC2_PROJECT_PATH }}

            # Pull latest code
            git pull origin main

            # Build new images, then swap containers
            docker compose build
            docker compose down
            docker compose up -d

            echo "Deployment complete — containers starting in background"
