# Alembic Configuration File
# This file is used by alembic to manage database migrations.

[alembic]
# Path to migration scripts — relative to this file
script_location = alembic

# Template used to generate migration file names
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(rev)s_%%(slug)s

# Timezone for file_template date rendering (UTC recommended)
timezone = UTC

# Truncate long revision id to this many characters
truncate_slug_length = 40

# Set to 'true' to run the environment during 'revision'
# to determine whether autogenerate detects any changes
revision_environment = false

# Placeholder — overridden by env.py using DATABASE_URL env var
sqlalchemy.url = postgresql://placeholder:placeholder@localhost/placeholder

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S